version: "3.9"

services:
  # ─── DATABASE ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: attendai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-attendai}
      POSTGRES_USER: ${POSTGRES_USER:-attendai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-attendai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── REDIS ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: attendai_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ─── MINIO (S3 Storage) ──────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: attendai_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── BACKEND (FastAPI) ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: attendai_backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-attendai}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-attendai}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redispass}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin123}
      - ENVIRONMENT=development
      - LOG_LEVEL=INFO
    volumes:
      - ./backend:/app
      - ml_models:/app/ml_models
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ─── CELERY WORKER ───────────────────────────────────────────────────────────
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: attendai_celery
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-attendai}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-attendai}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redispass}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - ./backend:/app
      - ml_models:/app/ml_models
    depends_on:
      - redis
      - postgres
    command: celery -A app.worker worker --loglevel=info --concurrency=2

  # ─── CELERY BEAT (Scheduler) ─────────────────────────────────────────────────
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: attendai_celery_beat
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-attendai}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-attendai}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redispass}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
    volumes:
      - ./backend:/app
    depends_on:
      - redis
      - celery-worker
    command: celery -A app.worker beat --loglevel=info

  # ─── CAMERA PROCESSOR ────────────────────────────────────────────────────────
  camera-processor:
    build:
      context: ./backend
      dockerfile: Dockerfile.camera
    container_name: attendai_camera
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redispass}@redis:6379/0
      - BACKEND_URL=http://backend:8000
      - CAMERA_PROCESS_INTERVAL=${CAMERA_PROCESS_INTERVAL:-0.5}
    volumes:
      - ./backend:/app
      - ml_models:/app/ml_models
    depends_on:
      - redis
      - backend
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ─── FRONTEND (React) ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: attendai_frontend
    restart: unless-stopped
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # ─── NGINX (Reverse Proxy) ───────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: attendai_nginx
    restart: unless-stopped
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend

  # ─── REDIS COMMANDER (Dev UI) ────────────────────────────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: attendai_redis_ui
    restart: unless-stopped
    environment:
      - REDIS_HOSTS=local:redis:6379:0:${REDIS_PASSWORD:-redispass}
    ports:
      - "8081:8081"
    profiles:
      - dev

  # ─── PROMETHEUS ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: attendai_prometheus
    restart: unless-stopped
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    profiles:
      - monitoring

  # ─── GRAFANA ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: attendai_grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards
    ports:
      - "3001:3000"
    profiles:
      - monitoring

volumes:
  postgres_data:
  redis_data:
  minio_data:
  ml_models:
  prometheus_data:
  grafana_data:

networks:
  default:
    name: attendai_network
